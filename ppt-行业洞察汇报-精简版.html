<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行业洞察 - 精简汇报</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .gradient-text {
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .half-slide {
      width: 620px;
      height: 360px;
    }
  </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen py-8">

  <!-- 半页 Slide 容器 -->
  <div class="half-slide bg-white rounded-xl shadow-2xl p-5 flex flex-col relative overflow-hidden">

    <!-- 标题行 -->
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-2">
        <div class="w-1.5 h-6 rounded-full bg-gradient-to-b from-indigo-500 to-purple-600"></div>
        <h2 class="text-base font-extrabold text-slate-800">行业洞察 · 运营商信息周报</h2>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="bg-green-100 text-green-700 text-[9px] font-bold px-2 py-0.5 rounded-full">已上线 · 连续产出5期</span>
      </div>
    </div>

    <!-- 主体内容：左右布局 -->
    <div class="flex-1 flex gap-4 min-h-0">

      <!-- 左侧：痛点 + 价值 -->
      <div class="flex-1 flex flex-col gap-2.5 min-h-0">
        
        <!-- 痛点（精简为横向一行） -->
        <div>
          <div class="text-[10px] font-bold text-red-500 mb-1.5 flex items-center gap-1">
            <span class="w-3.5 h-3.5 rounded bg-red-500 text-white text-[8px] flex items-center justify-center font-bold">!</span>
            现状痛点
          </div>
          <div class="grid grid-cols-2 gap-1.5">
            <div class="bg-red-50 rounded-lg px-2.5 py-1.5 flex items-start gap-1.5">
              <span class="text-red-400 text-[10px] font-bold mt-px">1</span>
              <div>
                <div class="text-[10px] font-bold text-slate-700">信息碎片化</div>
                <div class="text-[8px] text-slate-400">10+渠道，人工收集 <span class="text-red-500 font-bold">4-6h/周</span></div>
              </div>
            </div>
            <div class="bg-orange-50 rounded-lg px-2.5 py-1.5 flex items-start gap-1.5">
              <span class="text-orange-400 text-[10px] font-bold mt-px">2</span>
              <div>
                <div class="text-[10px] font-bold text-slate-700">时效性差</div>
                <div class="text-[8px] text-slate-400">关键信息滞后 <span class="text-orange-500 font-bold">3-5天</span></div>
              </div>
            </div>
            <div class="bg-amber-50 rounded-lg px-2.5 py-1.5 flex items-start gap-1.5">
              <span class="text-amber-400 text-[10px] font-bold mt-px">3</span>
              <div>
                <div class="text-[10px] font-bold text-slate-700">缺乏结构化</div>
                <div class="text-[8px] text-slate-400">零散信息难形成系统洞察</div>
              </div>
            </div>
            <div class="bg-yellow-50 rounded-lg px-2.5 py-1.5 flex items-start gap-1.5">
              <span class="text-yellow-500 text-[10px] font-bold mt-px">4</span>
              <div>
                <div class="text-[10px] font-bold text-slate-700">分发低效</div>
                <div class="text-[8px] text-slate-400">口头同步，团队认知不齐</div>
              </div>
            </div>
          </div>
        </div>

        <!-- AI 方案（精简工作流） -->
        <div>
          <div class="text-[10px] font-bold text-indigo-600 mb-1.5 flex items-center gap-1">
            <span class="w-3.5 h-3.5 rounded bg-indigo-500 text-white text-[8px] flex items-center justify-center">AI</span>
            AI + CodeBuddy Skill 自动化方案
          </div>
          <div class="flex items-center gap-1">
            <div class="bg-indigo-50 rounded-md px-2 py-1 text-center flex-1">
              <div class="text-[9px] font-bold text-indigo-700">指令触发</div>
            </div>
            <span class="text-indigo-300 text-[10px]">&#x25B6;</span>
            <div class="bg-blue-50 rounded-md px-2 py-1 text-center flex-1">
              <div class="text-[9px] font-bold text-blue-700">AI联网采集</div>
            </div>
            <span class="text-blue-300 text-[10px]">&#x25B6;</span>
            <div class="bg-purple-50 rounded-md px-2 py-1 text-center flex-1">
              <div class="text-[9px] font-bold text-purple-700">模板渲染</div>
            </div>
            <span class="text-purple-300 text-[10px]">&#x25B6;</span>
            <div class="bg-green-50 rounded-md px-2 py-1 text-center flex-1">
              <div class="text-[9px] font-bold text-green-700">多渠道分发</div>
            </div>
          </div>
        </div>

        <!-- 核心价值数据 -->
        <div>
          <div class="text-[10px] font-bold text-green-600 mb-1.5 flex items-center gap-1">
            <span class="w-3.5 h-3.5 rounded bg-green-500 text-white text-[8px] flex items-center justify-center font-bold">&#10003;</span>
            实现价值
          </div>
          <div class="grid grid-cols-4 gap-1.5">
            <div class="bg-slate-50 rounded-lg p-2 text-center border border-slate-100">
              <div class="text-lg font-black gradient-text leading-none">98%</div>
              <div class="text-[8px] text-slate-500 mt-0.5">效率提升</div>
              <div class="text-[7px] text-green-500 mt-0.5">4-6h → 5min</div>
            </div>
            <div class="bg-slate-50 rounded-lg p-2 text-center border border-slate-100">
              <div class="text-lg font-black gradient-text leading-none">4维</div>
              <div class="text-[8px] text-slate-500 mt-0.5">结构化覆盖</div>
              <div class="text-[7px] text-slate-400 mt-0.5">市场·人事·行业·政策</div>
            </div>
            <div class="bg-slate-50 rounded-lg p-2 text-center border border-slate-100">
              <div class="text-lg font-black gradient-text leading-none">3端</div>
              <div class="text-[8px] text-slate-500 mt-0.5">一键分发</div>
              <div class="text-[7px] text-slate-400 mt-0.5">网页·邮件·图片</div>
            </div>
            <div class="bg-slate-50 rounded-lg p-2 text-center border border-slate-100">
              <div class="text-lg font-black gradient-text leading-none">5期</div>
              <div class="text-[8px] text-slate-500 mt-0.5">稳定产出</div>
              <div class="text-[7px] text-slate-400 mt-0.5">11人周覆盖</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 右侧：周报截图展示 -->
      <div class="w-[180px] flex flex-col items-center justify-center flex-shrink-0">
        <!-- 手机 mockup -->
        <div class="relative">
          <div class="w-[140px] h-[248px] bg-white rounded-[16px] border-[3px] border-slate-800 overflow-hidden shadow-xl">
            <div class="h-4 bg-slate-800 flex items-center justify-center">
              <div class="w-10 h-2 bg-slate-700 rounded-full"></div>
            </div>
            <div class="w-full h-[calc(100%-16px)] overflow-hidden">
              <img src="weekly-report-0223-0228-compressed.png" alt="周报" style="width:100%;height:100%;object-fit:cover;object-position:top;" />
            </div>
          </div>
          <div class="absolute -z-10 top-2 left-2 w-[140px] h-[248px] rounded-[16px] bg-gradient-to-br from-indigo-200 to-purple-200 opacity-40"></div>
        </div>
        <div class="text-center mt-2">
          <div class="text-[8px] text-slate-400">最新一期 02.23-02.28</div>
          <div class="flex items-center gap-1 justify-center mt-0.5">
            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
            <span class="text-[7px] text-green-600 font-medium">GitHub Pages 在线归档</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
