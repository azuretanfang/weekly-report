          - generic [ref=e49]: 2月10日，中国移动官网撤下何飚的职务信息，随后确认其出任国家广播电视总局副局长。 何飚于2024年3月从中国联通调任中国移动总经理，在任仅23个月。 截至目前，中国移动总经理一职仍处于悬空状态，市场高度关注继任人选。 现任领导班子：董事长陈忠岳（2025年12月接任杨杰），执行董事王利民、财务总监李荣华。
