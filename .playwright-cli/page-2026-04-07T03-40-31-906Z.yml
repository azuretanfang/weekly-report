      - generic [ref=e59]: 6G加速·老业务退场·Agent爆发
    - generic [ref=e60]:
      - generic [ref=e61]:
        - generic [ref=e62]:
          - generic [ref=e63]: 🔥 焦点
          - generic [ref=e64]: 中国移动官宣4月30日全国关停5项老旧增值业务
        - generic [ref=e65]: 3月22日，中国移动通过官网、APP、10086短信等四大渠道发布全国统一公告： 自4月30日24时起，全国31省同步关停5项增值业务，包括"和生活"、"农信通"、"MM应用商城"等服务超10年的老旧产品。 系统将自动退订，不额外扣费，但用户需关注积分、优惠券等权益迁移。 此举标志着运营商正式告别"传统增值服务时代"，进一步聚焦AI+算力新业务体系。
      - generic [ref=e66]:
        - generic [ref=e67]:
          - generic [ref=e68]: 📡 6G
          - generic [ref=e69]: 2026中关村论坛：6G四项创新成果发布，具身智能成杀手级应用
        - generic [ref=e70]: 3月27日，2026中关村论坛年会6G技术与产业创新论坛在京举办，四项重磅成果集中发布： 赋能具身智能的6G可重构开放式创新网络平台、6G空天地智简语义立体通信网络试验平台等。 中国移动研究院院长黄宇红透露，我国已牵头完成3GPP首个6G需求标准研究项目，定义6G六大核心场景。 中国信科集团陈山枝提出"星地融合"和"智能体通信"是6G两大标志性特征，全球统一标准预计三年后形成。
      - generic [ref=e71]:
        - generic [ref=e72]:
          - generic [ref=e73]: 🤖 AI
          - generic [ref=e74]: 2026年被定义为"智能体爆发年"，运营商算力底座价值凸显
        - generic [ref=e75]: 新华社《环球》杂志4月2日刊发专题报道，将2026年定义为"智能体爆发年"。 核心逻辑：大模型推理能力成熟 + AI Agent从实验室走向产业落地 + 算力基础设施就绪。 三大运营商作为算力底座提供方，"Agent使用Token、Token拉动算力"的商业链路正在跑通。 日均Token调用量已从2024年初的1000亿跃升至2025年底的100万亿，增长1000倍。 运营商正从"卖连接"转向"卖推理结果"，Token经营成为核心战略。
      - generic [ref=e76]:
        - generic [ref=e77]:
          - generic [ref=e78]: 🦾 具身
          - generic [ref=e79]: 运营商集体布局具身智能，机器人赛道竞争白热化
        - generic [ref=e80]: 三大运营商均将具身智能视为"第二增长曲线"的关键赛道： 中国移动已于2025年4月成立具身智能产业创新中心，斥资1.2亿元采购宇树、智元机器人，并通过6G网络提供超低时延通信支撑。 中国电信依托天翼云+AIDC算力底座，打造机器人训练推理平台。 宇树科技被视为"具身智能第一股"最有力竞争者，2026年被定义为具身智能机器人量产元年。
