          - generic [ref=e90]: "\"双重政策压顶\"：央企利润上缴比例提升 + 内卷整治双管齐下"
        - generic [ref=e91]: 2026年3月中央财政预算披露关键调整：央企利润上缴比例将提升，直接影响运营商利润留存和再投资能力。 叠加工信部2026年深入整治"内卷式"竞争的监管要求，运营商面临"少留利润+不许低价"的双重夹击。 行业分析认为，这将倒逼运营商必须从"价格战"彻底转向"价值战"，加速AI+算力的商业化变现。
      - generic [ref=e92]:
        - generic [ref=e93]:
          - generic [ref=e94]: 📱 管控
          - generic [ref=e95]: 流量卡管控全面升级，"史上最严"新规持续发力
        - generic [ref=e96]: 2026年元旦起落地的"明白办、放心用"专项行动新规持续执行： 禁止跨省售卡激活、叫停直播渠道售卡、电商平台大流量卡集中清理。 四大运营商同步执行史上最严流量卡管控，从办卡渠道到资费套餐、从实名审核到售后保障全链条规范。 旨在终结低价大流量卡乱象，推动行业回归理性竞争。
      - generic [ref=e97]:
        - generic [ref=e98]:
          - generic [ref=e99]: 🏛️ 规划
          - generic [ref=e100]: "\"十五五\"规划落地，具身智能和6G列入未来产业培育体系"
        - generic [ref=e101]: "\"十五五\"规划纲要明确：构建未来产业全链条培育体系，推动量子科技、生物制造、 具身智能、第六代移动通信（6G）等前沿技术发展。 3月29日央视《焦点访谈》专题聚焦2026中关村论坛年会的6G、具身智能、太空算力等成果。 运营商作为6G和算力基础设施的主力军，将在\"十五五\"期间获得更大政策支持空间。"
