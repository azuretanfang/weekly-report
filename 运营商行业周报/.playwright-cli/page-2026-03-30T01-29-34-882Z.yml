        - generic [ref=e94]: 3月25日，工信部发布2026年前两个月通信业经济运行情况： 电信业务收入2904亿元，同比下降1.7%（值得关注的信号）； 但电信业务总量同比增长8.4%，"量增价降"趋势延续。 移动互联网累计流量666.7亿GB（+20.4%），5G用户12.35亿户（占比67.6%）， 5G基站总数达490.9万个，千兆宽带用户2.45亿户（占比35.3%）。
      - generic [ref=e95]:
        - generic [ref=e96]:
          - generic [ref=e97]: 🏛️ 监管
          - generic [ref=e98]: 工信部2026年持续推进整治"内卷式"竞争
        - generic [ref=e99]: 根据2025年底全国工业和信息化工作会议部署，2026年工信部将深入整治通信行业"内卷式"竞争， 要求电信央企必须执行。核心目标：规范市场秩序，减少低价恶性竞争，引导运营商从"价格战"转向"价值战"。 这与三大运营商年报中集体转向"Token经营"、追求高质量增长的战略方向形成政策共振。
      - generic [ref=e100]:
        - generic [ref=e101]:
          - generic [ref=e102]: 🧮 算力
          - generic [ref=e103]: 智算规模爆发式增长，政策持续加码
        - generic [ref=e104]: 2026年我国智算规模进入爆发期，中国移动智算规模达92.5 EFLOPS，中国电信达91 EFLOPS，中国联通达45 EFLOPS。 工信部此前部署的十大重点工作中，明确提出加快算力基础设施建设、推动"AI+"赋能千行百业。 三大运营商2026年算力投资合计将超过600亿元，占总资本开支比重均升至35%以上。
