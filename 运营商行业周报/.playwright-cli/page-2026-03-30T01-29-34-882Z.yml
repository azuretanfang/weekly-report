      - generic [ref=e62]: 年报季核心信号：从流量到Token
    - generic [ref=e63]:
      - generic [ref=e64]:
        - generic [ref=e65]:
          - generic [ref=e66]: 🔥 焦点
          - generic [ref=e67]: 三大运营商集体转向"Token经营"新模式
        - generic [ref=e68]: 本周年报季最核心信号：运营商正从"卖连接、卖带宽"转向"卖算力、卖Token、卖推理结果"。 我国日均Token调用量已从2024年初的1000亿跃升至2025年底的100万亿。 中国移动提出"Agent使用Token、Token拉动算力"的服务链路，将通信、算力与智能三大服务统一经营。 中国电信率先将AI Token提升至企业核心经营战略，按通用、专业和定制Token提供差异化服务。 中国联通则推动"Agent+Token+AI云"新范式落地。
      - generic [ref=e69]:
        - generic [ref=e70]:
          - generic [ref=e71]: 📡 技术
          - generic [ref=e72]: 中国电信"智聚大上行"方案赋能Mobile AI
        - generic [ref=e73]: 中国电信与华为联合推出"智聚大上行"解决方案，实测达到1Gbps上行峰值速率，现网时延降低30%以上。 已在国内六省启动试点，部署逾13万座5G-A基站，覆盖300+重点城市。 打造了上海宝钢智慧专网、合肥骆岗中央公园首个"5G-A×AI大上行端到端示范区"等标杆案例， 上海浦江5G-A×AI立体网络项目获MWC 2026 GSMA Foundry卓越奖。
      - generic [ref=e74]:
        - generic [ref=e75]:
          - generic [ref=e76]: 💰 投资
          - generic [ref=e77]: 2026年资本开支"减总量、调结构"，算力投资占比超35%
        - generic [ref=e78]: 三大运营商2026年总资本开支均下降，但算力成为绝对主攻方向： 中国移动1366亿元（-9.5%），算力网络投资增长62.4%，智能网络投资增长19.8%，合计占比超37%； 中国电信730亿元（-9.2%），算力基础设施255亿元（+26%），AIDC投资增长28%，占比35%； 中国联通约500亿元，算力投资占比超35%。
      - generic [ref=e79]:
        - generic [ref=e80]:
          - generic [ref=e81]: ☁️ 云计算
          - generic [ref=e82]: 天翼云突破1200亿，运营商云格局初定
        - generic [ref=e83]: 中国电信天翼云2025年收入达1207亿元，稳居公有云IaaS国内第二、IaaS+PaaS合并口径前三。 中国移动移动云同样保持高速增长，对外服务IDC标准机架超150万架，建成两大超万卡智算集群。 中国联通数据中心收入达281亿元（+8.5%），已建成7个百兆瓦级AIDC园区。 运营商正在从"底层连接"向"云+AI一体化"全栈服务演进。
