name: 英文精读报告生成器
version: 1.3.0
author: fangtan
description: |
  AI驱动的英文文章精读分析工具。支持常见错误句型识别、生词标注、难度等级分析、
  长难句拆解，输出 HTML 精读报告。

  v1.3.0 改进：
  - CEFR 等级判定改用 textstat（Flesch-Kincaid Grade + Dale-Chall）替代经验公式，
    修复"任何文本被打成 C2"的 P0 算法缺陷。
  - 词汇分级新增 wordfreq Zipf 频率作为 fallback 主链路，advanced 词召回率显著提升。
  - 所有新依赖均带 ImportError 优雅降级，缺失也能跑（降级到经验公式 + 自建词库）。

keywords:
  - 英文精读
  - 词汇分析
  - 语法识别
  - 长难句拆解
  - 英文学习

features:
  - 支持文本/URL/文件输入
  - AI驱动常见错误句型识别（仅英文）
  - 生词自动高亮和词汇等级标注
  - 难度等级分析（A1-C2，基于 Flesch-Kincaid Grade + Dale-Chall）
  - 长难句结构拆解
  - HTML 精读报告导出

requirements:
  - claude-3-5-sonnet (API)
  - nltk
  - textstat
  - wordfreq
  - g2p_en
  - gTTS
  - requests
